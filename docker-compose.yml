version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      - APP_ENV=production
      - USE_CELERY=true
      - REDIS_URL=redis://redis:6379/0
    depends_on: [redis]
    volumes:
      - uploads:/tmp/semiovis_uploads

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: [redis]

  redis:
    image: redis:7-alpine

  frontend:
    build: frontend/
    ports: ["3000:80"]

volumes:
  uploads:
