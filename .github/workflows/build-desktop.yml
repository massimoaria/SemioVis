name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      # Install system dependencies (Linux)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            cmake libopencv-dev libeigen3-dev

      # Install system dependencies (macOS)
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake opencv eigen pybind11

      # Install system dependencies (Windows)
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install cmake opencv eigen3 -y

      # Setup Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Rust
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install Python dependencies
      - name: Install Python backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Build frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Build C++ core
      - name: Build C++ core
        if: runner.os != 'Windows'
        working-directory: backend/cpp
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc || sysctl -n hw.ncpu)

      # Build Tauri
      - name: Build Tauri app
        working-directory: desktop/src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      # Package artifacts
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp desktop/src-tauri/target/${{ matrix.target }}/release/semiovis-desktop dist/
          cd dist && tar czf ../SemioVis-${{ matrix.label }}.tar.gz *

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy desktop\src-tauri\target\${{ matrix.target }}\release\semiovis-desktop.exe dist\
          Compress-Archive -Path dist\* -DestinationPath SemioVis-${{ matrix.label }}.zip

      # Upload artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: |
            SemioVis-*.tar.gz
            SemioVis-*.zip

  # Create release when tagged
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SemioVis-*/*.tar.gz
            SemioVis-*/*.zip
          generate_release_notes: true
