name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: '3.12'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      # ── Remove stale PyInstaller spec (has hardcoded local paths) ──
      - name: Remove stale spec file
        shell: bash
        run: rm -f desktop/build-scripts/semiovis_api.spec

      # ── System dependencies ──────────────────────────────────────

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake opencv eigen pybind11

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install cmake -y

      # ── Rust ─────────────────────────────────────────────────────

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # ── Node.js ──────────────────────────────────────────────────

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Python ───────────────────────────────────────────────────

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      # ── Download ML model weights ───────────────────────────────

      - name: Download model weights
        run: python backend/models/download_models.py

      # ── Build C++ core (macOS only) ─────────────────────────────

      - name: Build C++ core
        if: runner.os == 'macOS'
        working-directory: backend/cpp
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR=$(python -c "import pybind11; print(pybind11.get_cmake_dir())")
          cmake --build build -j$(sysctl -n hw.ncpu)

      # ── Build frontend ──────────────────────────────────────────

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Bundle backend with PyInstaller ─────────────────────────

      - name: Bundle backend (macOS — onefile)
        if: runner.os == 'macOS'
        run: python desktop/build-scripts/bundle_backend.py

      - name: Bundle backend (Windows — onedir)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $repoRoot = $PWD.Path
          $models = Get-ChildItem -Path backend/models -Include *.pt,*.onnx -Recurse
          $addData = @()
          foreach ($m in $models) {
            $addData += "--add-data"
            $addData += "$($m.FullName);models/"
          }
          python -m PyInstaller backend/main.py `
            --name semiovis_api `
            --onedir `
            --clean `
            --noconfirm `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            @addData `
            --distpath "$repoRoot/desktop/src-tauri" `
            --workpath "$repoRoot/desktop/build-scripts/build" `
            --specpath "$repoRoot/desktop/build-scripts"
          # Move onedir output to bin/
          $src = "$repoRoot/desktop/src-tauri/semiovis_api"
          $dst = "$repoRoot/desktop/src-tauri/bin"
          Write-Host "Checking if $src exists..."
          if (Test-Path $src) {
            if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
            Move-Item -Path $src -Destination $dst -Force
            $size = (Get-ChildItem -Recurse $dst | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "Windows backend dir size: $([math]::Round($size, 1)) MB"
            Write-Host "Files in bin/:"
            Get-ChildItem $dst | Select-Object Name, Length | Format-Table
          } else {
            Write-Host "ERROR: PyInstaller output directory not found at $src"
            Write-Host "Contents of desktop/src-tauri/:"
            Get-ChildItem "$repoRoot/desktop/src-tauri/" | Select-Object Name
            exit 1
          }

      - name: Verify backend binary
        shell: bash
        run: |
          echo "Contents of bin/:"
          ls desktop/src-tauri/bin/ | head -20
          if [ -f "desktop/src-tauri/bin/semiovis_api" ] || [ -f "desktop/src-tauri/bin/semiovis_api.exe" ]; then
            echo "Backend binary found"
          else
            echo "ERROR: No semiovis_api binary in bin/"
            exit 1
          fi

      # ── Create install script placeholder ───────────────────────

      - name: Ensure scripts directory
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/scripts
          if [ ! -f "desktop/src-tauri/scripts/Install SemioVis.command" ]; then
            echo '#!/bin/bash' > "desktop/src-tauri/scripts/Install SemioVis.command"
            echo 'echo "SemioVis installed successfully"' >> "desktop/src-tauri/scripts/Install SemioVis.command"
            chmod +x "desktop/src-tauri/scripts/Install SemioVis.command"
          fi

      # ── Install Tauri CLI ───────────────────────────────────────

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      # ── Build Tauri bundle ──────────────────────────────────────

      - name: Build Tauri app bundle
        working-directory: desktop/src-tauri
        run: cargo tauri build

      # ── Upload artifacts ────────────────────────────────────────

      - name: Upload macOS bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows bundle
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        shell: bash
        run: find . -type f \( -name "*.dmg" -o -name "*.exe" \)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SemioVis-*/*.dmg
            SemioVis-*/*.exe
          generate_release_notes: true
