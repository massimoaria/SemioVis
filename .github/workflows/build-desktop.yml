name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: '3.12'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      # ── System dependencies ──────────────────────────────────────

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            cmake libopencv-dev libeigen3-dev patchelf

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake opencv eigen pybind11

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install cmake -y

      # ── Rust ─────────────────────────────────────────────────────

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # ── Node.js ──────────────────────────────────────────────────

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Python ───────────────────────────────────────────────────

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      # ── Download ML model weights ───────────────────────────────

      - name: Download model weights
        run: python backend/models/download_models.py

      # ── Build C++ core (non-Windows) ────────────────────────────

      - name: Build C++ core
        if: runner.os != 'Windows'
        working-directory: backend/cpp
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR=$(python -c "import pybind11; print(pybind11.get_cmake_dir())")
          cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      # ── Build frontend ──────────────────────────────────────────

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Bundle backend with PyInstaller ─────────────────────────
      # macOS: --onefile works fine (~400MB)
      # Linux: --onefile exceeds 4GB struct limit → use --onedir
      # Windows: --onefile, no C++ core yet

      - name: Bundle backend (macOS)
        if: runner.os == 'macOS'
        run: python desktop/build-scripts/bundle_backend.py

      - name: Bundle backend (Linux — onedir to avoid 4GB limit)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/bin
          SO_FILE=$(find backend/cpp/build -name 'semiovis_core*.so' | head -1)
          ADD_BIN=""
          if [ -n "$SO_FILE" ]; then
            ADD_BIN="--add-binary $SO_FILE:."
          fi
          # Collect model files
          ADD_DATA=""
          for f in backend/models/*.pt backend/models/*.onnx; do
            [ -f "$f" ] && ADD_DATA="$ADD_DATA --add-data $f:models/"
          done
          python -m PyInstaller backend/main.py \
            --name semiovis_api \
            --onedir \
            --noconfirm \
            --hidden-import semiovis_core \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            $ADD_BIN $ADD_DATA \
            --distpath desktop/src-tauri/bin \
            --workpath desktop/build-scripts/build \
            --specpath desktop/build-scripts
          # For --onedir, PyInstaller creates bin/semiovis_api/ directory
          # Create a wrapper script so sidecar.rs can find it at bin/semiovis_api (as file)
          if [ -d "desktop/src-tauri/bin/semiovis_api" ]; then
            mv desktop/src-tauri/bin/semiovis_api desktop/src-tauri/bin/semiovis_api_dir
            printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")/semiovis_api_dir" && pwd)"\nexec "$DIR/semiovis_api" "$@"\n' > desktop/src-tauri/bin/semiovis_api
            chmod +x desktop/src-tauri/bin/semiovis_api
          fi

      - name: Bundle backend (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/bin
          # Collect model files
          ADD_DATA=""
          for f in backend/models/*.pt backend/models/*.onnx; do
            [ -f "$f" ] && ADD_DATA="$ADD_DATA --add-data $f:models/"
          done
          python -m PyInstaller backend/main.py \
            --name semiovis_api \
            --onedir \
            --noconfirm \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            $ADD_DATA \
            --distpath desktop/src-tauri/bin

      - name: Verify backend binary exists
        shell: bash
        run: |
          echo "Contents of bin/:"
          ls -la desktop/src-tauri/bin/
          if [ -f "desktop/src-tauri/bin/semiovis_api" ]; then
            echo "Backend binary found ($(du -sh desktop/src-tauri/bin/semiovis_api | cut -f1))"
          elif [ -d "desktop/src-tauri/bin/semiovis_api" ] || [ -d "desktop/src-tauri/bin/semiovis_api_dir" ]; then
            echo "Backend directory bundle found ($(du -sh desktop/src-tauri/bin/semiovis_api_dir 2>/dev/null || du -sh desktop/src-tauri/bin/semiovis_api | cut -f1))"
          elif [ -f "desktop/src-tauri/bin/semiovis_api.exe" ] || [ -d "desktop/src-tauri/bin/semiovis_api" ]; then
            echo "Backend found (Windows)"
          else
            echo "ERROR: Backend binary not found!"
            find desktop/src-tauri/bin/ -maxdepth 2 -type f | head -20
            exit 1
          fi

      # ── Create install script placeholder (macOS) ──────────────

      - name: Ensure scripts directory
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/scripts
          if [ ! -f "desktop/src-tauri/scripts/Install SemioVis.command" ]; then
            echo '#!/bin/bash' > "desktop/src-tauri/scripts/Install SemioVis.command"
            echo 'echo "SemioVis installed successfully"' >> "desktop/src-tauri/scripts/Install SemioVis.command"
            chmod +x "desktop/src-tauri/scripts/Install SemioVis.command"
          fi

      # ── Install Tauri CLI ───────────────────────────────────────

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      # ── Build Tauri bundle ──────────────────────────────────────

      - name: Build Tauri app bundle
        working-directory: desktop/src-tauri
        run: cargo tauri build

      # ── Upload artifacts ────────────────────────────────────────

      - name: Upload macOS bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Linux bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows bundle
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: find . -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" \) | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SemioVis-*/*.dmg
            SemioVis-*/*.deb
            SemioVis-*/*.AppImage
            SemioVis-*/*.msi
            SemioVis-*/*.exe
          generate_release_notes: true
