name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      # Install system dependencies (Linux)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            cmake libopencv-dev libeigen3-dev

      # Install system dependencies (macOS)
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake opencv eigen pybind11

      # Install system dependencies (Windows)
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install cmake -y

      # Setup Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Rust
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install Python dependencies
      - name: Install Python backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Build frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Build C++ core
      - name: Build C++ core
        if: runner.os != 'Windows'
        working-directory: backend/cpp
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -Dpybind11_DIR=$(python -c "import pybind11; print(pybind11.get_cmake_dir())")
          cmake --build build -j$(nproc || sysctl -n hw.ncpu)

      # Install Tauri CLI
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      # Build Tauri bundle (.app/.dmg/.msi/.deb/.AppImage)
      - name: Build Tauri app bundle
        working-directory: desktop/src-tauri
        run: cargo tauri build

      # Upload macOS artifacts
      - name: Upload macOS bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app

      # Upload Linux artifacts
      - name: Upload Linux bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      # Upload Windows artifacts
      - name: Upload Windows bundle
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SemioVis-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe

  # Create release when tagged
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SemioVis-*/*.dmg
            SemioVis-*/*.deb
            SemioVis-*/*.AppImage
            SemioVis-*/*.msi
            SemioVis-*/*.exe
          generate_release_notes: true
